description: Run schedule


inputs:
  token:
    description: Personal Access Token
    required: false
    default: ''


runs:
  using: composite

  steps:
    - uses: li1ht2ay-3es/gi1-ac2io3s@keep-alive
      with:
        token: ${{ inputs.token }}
        auto: true
      if: github.event.schedule=='* * 1 * *'


    - uses: li1ht2ay-3es/gi1-ac2io3s@rebase-repo
      with:
        remote_repo: libretro/vice-libretro
        remote_branch: master

        auto: true
        token: ${{ inputs.token }}
