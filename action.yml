description: build libretro


inputs:
  token:
    description: github token
    required: false
    default: ''

  arch:
    description: target platform
    required: false
    default: x64

  core:
    description: target machine
    required: false
    default: 64


runs:
  using: composite

  steps:
    - uses: li1ht2ay-3es/gi1-ac2io3s@checkout-repo
      with:
        token: ${{ inputs.token }}
        branch: upstream
        auto: true


    - uses: li1ht2ay-3es/gi1-ac2io3s@mingw-install
      with:
        arch: ${{ inputs.arch }}


    - uses: li1ht2ay-3es/gi1-ac2io3s@cache-read
      with:
        name: cache-${{ inputs.core }}-${{ inputs.arch }}


    - shell: bash
      run: |
        merge () {
          echo "<<< ===  merging  $1  === >>>"
          git merge origin/$1
          echo ""
        }

        # merge compiler-flags
        # merge libretro-options

        # merge crop-border
        # merge fast-bootrom
        # merge osd-message
        # merge sprite-limit
        # merge video-overclock
        # merge volume-level


    - shell: bash
      run: |
        make platform="win" EMUTYPE="x${{ inputs.core }}" CC="$MINGW_CC" CXX="$MINGW_CXX"


    - uses: li1ht2ay-3es/gi1-ac2io3s@cache-write
      with:
        name: cache-${{ inputs.core }}-${{ inputs.arch }}


    - uses: actions/upload-artifact@main
      with:
        name: vice_${{ inputs.core }}_${{ inputs.arch }}
        path: ${{ github.workspace }}/**.dll
